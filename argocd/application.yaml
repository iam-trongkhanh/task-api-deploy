apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-api-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/yourusername/task-api-deploy.git'
    targetRevision: HEAD
    path: .
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
